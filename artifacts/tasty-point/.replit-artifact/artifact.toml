kind = "web"
previewPath = "/"
title = "Tasty Point"
version = "1.0.0"
id = "artifacts/tasty-point"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22677

[services.development]
run = "pnpm --filter @workspace/tasty-point run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tasty-point", "run", "build" ]
publicDir = "artifacts/tasty-point/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22677"
BASE_PATH = "/"
